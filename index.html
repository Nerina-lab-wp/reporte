<style>
  .dashboard-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
    margin-bottom:1.5rem;
  }

  .card {
    background:var(--color-background-secondary);
    border-radius:var(--border-radius-md);
    padding:1rem;
    text-align:center;
    transition:all .2s ease;
  }

  .card:hover {
    transform:translateY(-2px);
  }

  .card-title {
    font-size:12px;
    color:var(--color-text-secondary);
    margin-bottom:4px;
  }

  .card-value {
    font-size:28px;
    font-weight:600;
  }

  .card-sub {
    font-size:11px;
    color:var(--color-text-secondary);
  }

  .filters {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }

  .filter-btn {
    font-size:12px;
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
    border:0.5px solid var(--color-border-secondary);
    background:white;
    transition:all .2s ease;
  }

  .filter-btn.active {
    font-weight:500;
    box-shadow:0 0 0 1px rgba(0,0,0,0.05) inset;
  }

  .table-container {
    border:0.5px solid var(--color-border-tertiary);
    border-radius:var(--border-radius-lg);
    overflow:hidden;
  }

  table {
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }

  thead {
    background:var(--color-background-secondary);
  }

  th, td {
    padding:10px 12px;
  }

  th {
    text-align:left;
    font-weight:500;
    color:var(--color-text-secondary);
  }

  tbody tr {
    border-top:0.5px solid var(--color-border-tertiary);
    transition:background .15s ease;
  }

  tbody tr:hover {
    background:rgba(0,0,0,0.02);
  }

  .center { text-align:center; }

  .ellipsis {
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
</style>

const badges = {
  "Completó": {bg:"#E1F5EE",color:"#085041",border:"#9FE1CB"},
  "No cursó": {bg:"#FCEBEB",color:"#501313",border:"#F7C1C1"},
  "En curso / incompleto": {bg:"#FAEEDA",color:"#412402",border:"#FAC775"},
  "Bajo rendimiento": {bg:"#FAECE7",color:"#4A1B0C",border:"#F5C4B3"},
};

let current = 'todos';

function filter(f, el) {
  current = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const body = document.getElementById('tableBody');

  const filtered = current === 'todos'
    ? data
    : data.filter(r => r[3] === current);

  body.innerHTML = filtered.map(r => {
    const b = badges[r[3]];
    const prom = r[2] !== null ? r[2].toFixed(1) : '—';

    const promColor =
      r[2] === null
        ? 'var(--color-text-secondary)'
        : r[2] >= 90
        ? '#0F6E56'
        : r[2] >= 70
        ? 'var(--color-text-primary)'
        : '#A32D2D';

    return `
      <tr>
        <td class="ellipsis">${r[0]}</td>
        <td class="ellipsis" style="font-size:12px;color:var(--color-text-secondary);">${r[1]}</td>
        <td class="center" style="font-weight:500;color:${promColor};">${prom}</td>
        <td class="center">
          <span style="
            font-size:11px;
            padding:4px 9px;
            border-radius:10px;
            background:${b.bg};
            color:${b.color};
            border:0.5px solid ${b.border};
            white-space:nowrap;">
            ${r[3]}
          </span>
        </td>
      </tr>
    `;
  }).join('');
}

render();
